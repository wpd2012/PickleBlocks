<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#eef2f7" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f172a" />
    <link rel="icon" type="image/png" href="/PickleBlocks/favicon.png" />
    <link rel="apple-touch-icon" href="/PickleBlocks/apple-touch-icon.png" />
    <title>PickleBlocks</title>
    <style>
      html, body {
        background-color: #0f172a;
      }
      html.light-mode, html.light-mode body {
        background-color: #eef2f7 !important;
      }
      @media (prefers-color-scheme: light) {
        html:not(.dark-mode), html:not(.dark-mode) body {
          background-color: #eef2f7;
        }
      }
    </style>
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('editor-settings');
          var mode = 'auto';
          if (stored) {
            var parsed = JSON.parse(stored);
            mode = (parsed && parsed.general && parsed.general.themeMode) || 'auto';
          }
          if (mode === 'dark' || (mode === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark-mode');
            document.documentElement.classList.remove('light-mode');
          } else {
            document.documentElement.classList.remove('dark-mode');
            document.documentElement.classList.add('light-mode');
          }
        } catch (e) {}
      })();
    </script>

    <link rel="stylesheet" crossorigin href="/PickleBlocks/assets/index-BgmiwQgX.css">

  <body>
    <div id="root"></div>
  </body>
</html>
